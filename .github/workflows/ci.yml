name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build data assets
        run: pnpm build-vocab && pnpm build-kanji

      - name: Lint
        run: pnpm run lint

      - name: Type check
        run: pnpm run typecheck

      - name: Unit tests
        run: pnpm run test:unit

      - name: Install Playwright browsers
        run: pnpm --filter @nihonnohon/web exec playwright install --with-deps chromium firefox webkit

      - name: E2E tests
        run: pnpm run test:e2e

      - name: Upload Playwright snapshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-actual-snapshots
          path: apps/web/e2e/accessibility.spec.ts-snapshots/
          if-no-files-found: ignore

      - name: Build
        run: pnpm run build
