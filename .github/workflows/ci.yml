name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: turbo lint

      - name: Type check
        run: turbo typecheck

      - name: Unit tests
        run: turbo test:unit

      - name: Install Playwright browsers
        run: pnpm --filter @nihonnohon/web exec playwright install --with-deps chromium firefox webkit

      - name: E2E tests
        run: turbo test:e2e

      - name: Build
        run: turbo build
